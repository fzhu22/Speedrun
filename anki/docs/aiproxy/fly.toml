# Speedrun AI proxy on Fly.io, configured to stay effectively free (like the sync
# server): one shared-cpu-1x / 256MB machine that auto-stops to zero when idle, shared
# IPv4, no volume. The real OpenAI key + the client app token are Fly SECRETS, never in
# this file or the client build (see README.md).
#
# `app` and `primary_region` are yours to set before deploying.

app = "speedrun-ai-frank-pbr9"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  OPENAI_BASE_URL = "https://api.openai.com/v1"
  ALLOWED_MODELS = "gpt-4.1-mini"
  RATE_LIMIT_PER_MIN = "30"

[http_service]
  internal_port = 8080
  force_https = true
  # Sleep the machine when there is no traffic; wake it on the next AI call.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
