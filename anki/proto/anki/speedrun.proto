syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

import "anki/generic.proto";

// Speedrun: shared backend for the readiness dashboard. The data behind the
// dashboard (coverage map, per-section memory, the three scores, and the
// prerequisite-aware study plan) is computed once here in the shared Rust engine
// so the desktop (Python) and AnkiDroid (Kotlin) render an identical dashboard.
service SpeedrunService {
  // Read-only: the coverage/memory/plan data for the readiness dashboard.
  rpc SpeedrunDashboard(SpeedrunDashboardRequest) returns (SpeedrunDashboardResponse);
  // Review-time write: update the per-family support-fading ladder for one
  // answered card and persist the resulting rung (as config + a syncable tag).
  rpc SpeedrunRecordReview(SpeedrunRecordReviewRequest) returns (SpeedrunRecordReviewResponse);
  // Read-only: whether a missed card should prompt for a disconfirmer.
  rpc SpeedrunShouldPromptDisconfirmer(SpeedrunShouldPromptRequest) returns (SpeedrunShouldPromptResponse);
  // Read-only: validate a student-authored disconfirmer ("" = ok).
  rpc SpeedrunValidateDisconfirmer(SpeedrunValidateDisconfirmerRequest) returns (SpeedrunValidateDisconfirmerResponse);
  // Write: build a Speedrun Disconfirmer note from a missed card.
  rpc SpeedrunCreateDisconfirmer(SpeedrunCreateDisconfirmerRequest) returns (SpeedrunCreateDisconfirmerResponse);
  // Write: create the Speedrun note types (Disconfirmer + Pretest) if missing.
  rpc SpeedrunEnsureNotetypes(anki.generic.Empty) returns (anki.generic.Empty);
  // Read-only: deterministic question-writing guidance for the Add-card flow.
  rpc SpeedrunAuthoringGuidance(SpeedrunGuidanceRequest) returns (SpeedrunGuidanceResponse);
  // Write: fit the performance model from the review log and set the
  // performance-enabled flag (the desktop "Fit Performance Model" step).
  rpc SpeedrunFitPerformance(anki.generic.Empty) returns (SpeedrunFitPerformanceResponse);
}

// The AI lane: outbound HTTPS to the Speedrun proxy, so these run on Backend
// (which owns the tokio runtime + web client). Each degrades to a deterministic
// template when AI is off. Everything else in SpeedrunService is delegated to
// Collection.
service BackendSpeedrunService {
  // Advice on what ELSE to add to a draft card (never rewrites it).
  rpc SpeedrunCardAdvice(SpeedrunAdviceRequest) returns (SpeedrunAiResponse);
  // Concept ideas for an empty card in a chosen topic.
  rpc SpeedrunTopicIdeas(SpeedrunTopicIdeasRequest) returns (SpeedrunAiResponse);
  // A Socratic hint for authoring a disconfirmer (never the answer).
  rpc SpeedrunDisconfirmerHint(SpeedrunHintRequest) returns (SpeedrunAiResponse);
}

message SpeedrunDashboardRequest {
  // "::" tag prefix that scopes MCAT cards; defaults to "MCAT" when empty.
  string tag_prefix = 1;
  // A card counts as mastered at or above this FSRS retrievability; defaults to
  // 0.9 when left at 0.
  float mastered_retrievability = 2;
  // Overall coverage must reach this fraction before readiness is allowed;
  // defaults to 0.5 when left at 0.
  float give_up_line = 3;
  // Minimum graded reviews before readiness is allowed; defaults to 200 when 0.
  uint32 min_reviews_for_readiness = 4;
}

message SpeedrunDashboardResponse {
  // Per-section coverage and (abstaining) memory.
  message SectionRow {
    string section = 1;
    string abbrev = 2;
    float coverage = 3;
    // Mean per-content-category recall; unset = abstain (no reviewed cards).
    optional float memory = 4;
    // Wilson score interval around `memory` (95%), treating recall as a success
    // proportion over `reviewed_cards`, so the range narrows as more cards are
    // reviewed. Both unset whenever `memory` abstains.
    optional float memory_low = 5;
    optional float memory_high = 6;
    // Cards with a defined FSRS recall backing this section's memory estimate
    // (the n behind the interval); 0 when memory abstains.
    uint32 reviewed_cards = 7;
    // Performance: accuracy on graded held-out exam-style items for this section,
    // with its 95% Wilson interval. All unset unless the performance model has
    // passed its incremental-validity gate AND the section has enough graded items
    // (a separately-gated score; never blended with memory).
    optional float performance = 8;
    optional float performance_low = 9;
    optional float performance_high = 10;
    // Graded held-out items backing the performance estimate (the n).
    uint32 performance_items = 11;
    // Every content-category leaf in this section, marked covered or not (spec 7c),
    // in outline order - so the dashboard can show which topics are missing, not
    // just a section-level percent.
    repeated TopicCoverage topics = 12;
  }
  // One outline leaf topic and whether the deck covers it (has >=1 card for it).
  message TopicCoverage {
    string code = 1;
    string title = 2;
    bool covered = 3;
  }
  // A single recommended next thing to study.
  message PlanItem {
    string code = 1;
    string title = 2;
    // Current fading rung, "L3" (most support) .. "L0" (mastery).
    string rung = 3;
    string reason = 4;
    float score = 5;
    // True when this item was surfaced as a prerequisite of a higher-value leaf.
    bool prerequisite = 6;
  }
  float overall_coverage = 1;
  uint32 covered_leaves = 2;
  uint32 total_leaves = 3;
  repeated SectionRow sections = 4;
  // coverage >= give_up_line AND total_reviews >= min_reviews_for_readiness.
  bool readiness_allowed = 5;
  float give_up_line = 6;
  uint32 total_reviews = 7;
  // Performance is always the abstain string for now (no exam-style items yet).
  string performance_status = 8;
  // The readiness abstain reason, or "allowed".
  string readiness_status = 9;
  repeated PlanItem plan = 10;
  // The score-model "prove it" evidence (spec section 9 Steps 1 & 2): memory
  // calibration on held-back reviews + the performance model's incremental-validity
  // gate. Cached by the fit tier; unset until it has been computed at least once.
  optional SpeedrunEvidence evidence = 11;
}

// Score-model evidence surfaced read-only on the dashboard (spec section 9).
// Computed by the fit tier (speedrun_fit_performance) and cached in collection config,
// so the read-only dashboard can show it without the expensive recompute each load.
message SpeedrunEvidence {
  // Step 1 - memory calibration on held-back reviews (FSRS time-series-split eval).
  // log_loss is a proper score; rmse is the calibration error across probability bins
  // (the reliability-diagram summary): small rmse == "says 80% -> recalls ~80%".
  // All unset when there is not enough review history to evaluate.
  optional float memory_log_loss = 1;
  optional float memory_rmse = 2;
  uint32 memory_reviews = 3;
  // Step 2 - the performance model's incremental validity: out-of-sample AUC of the
  // full model (topic mastery + difficulty + timing + coverage) vs a recall-only model.
  // Performance ships only when the full model beats recall by the required margin.
  optional float perf_auc_full = 4;
  optional float perf_auc_recall = 5;
  optional float perf_auc_delta = 6;
  uint32 perf_responses = 7;
  bool perf_passed = 8;
}

message SpeedrunRecordReviewRequest {
  int64 card_id = 1;
  // rating 1=Again, 2=Hard, 3=Good, 4=Easy; success = rating >= 2 (matches state.py).
  uint32 rating = 2;
}

message SpeedrunRecordReviewResponse {
  // The normalised concept-family key: the AAMC content-category CODE (e.g. "1A")
  // the dashboard uses, or "" when the card is not on the ladder.
  string family = 1;
  // The resulting fading rung, "L3" (most support) .. "L0" (mastery).
  string rung = 2;
  // True when the rung advanced or regressed on this review.
  bool changed = 3;
}

message SpeedrunShouldPromptRequest {
  int64 card_id = 1;
  uint32 rating = 2;
  // In-session repeated misses; total misses = card.lapses + session_misses.
  uint32 session_misses = 3;
}

message SpeedrunShouldPromptResponse {
  bool should_prompt = 1;
  bool struggling = 2;
}

message SpeedrunValidateDisconfirmerRequest {
  string text = 1;
  string answer = 2;
}

message SpeedrunValidateDisconfirmerResponse {
  // A revise message, or "" when the disconfirmer is acceptable.
  string problem = 1;
}

message SpeedrunCreateDisconfirmerRequest {
  int64 card_id = 1;
  string disconfirmer = 2;
  string principle = 3;
  bool assisted = 4;
}

message SpeedrunCreateDisconfirmerResponse {
  int64 note_id = 1;
}

message SpeedrunGuidanceRequest {
  // The explicitly chosen content-category code (e.g. "1A"); empty = infer.
  string code = 1;
  // The note's tags + target deck, used to infer a topic when code is empty.
  repeated string tags = 2;
  string deck_name = 3;
}

message SpeedrunGuidanceResponse {
  // Guidance lines: a lead line followed by the universal tips.
  repeated string lines = 1;
  // The resolved topic (empty when none), so the UI can show/select it.
  string code = 2;
  string title = 3;
}

message SpeedrunFitPerformanceResponse {
  bool passed = 1;
  uint32 n = 2;
  float auc_full = 3;
  float auc_recall = 4;
  float delta = 5;
  uint32 min_responses = 6;
  float min_delta = 7;
}

// Shared response for the AI helpers: the text plus its named source
// ("AI:<model>" or "template"), so every output is traceable (the honesty rule).
message SpeedrunAiResponse {
  string text = 1;
  string source = 2;
}

message SpeedrunAdviceRequest {
  string question = 1;
  string answer = 2;
  string topic = 3;
}

message SpeedrunTopicIdeasRequest {
  string topic = 1;
}

message SpeedrunHintRequest {
  string question = 1;
  string answer = 2;
}
